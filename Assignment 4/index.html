<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    
    <!-- Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <span class="material-symbols-outlined">cloud</span>
                Weather Dashboard
            </span>
            <div class="search-container">
                <input type="text" id="cityInput" class="form-control" placeholder="Enter city name..." style="width: 250px;">
                <button class="btn btn-light ms-2" onclick="searchCity()">Search</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-5">
        <!-- Temperature Unit Toggle -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="unit-toggle">
                    <button class="unit-btn active" onclick="toggleUnit('F')">°F Fahrenheit</button>
                    <button class="unit-btn" onclick="toggleUnit('C')">°C Celsius</button>
                </div>
            </div>
        </div>
        <!-- Current Weather Section -->
        <div class="row mb-5">
            <div class="col-md-12">
                <div class="current-weather-card">
                    <div class="weather-header">
                        <h2 id="cityName">New York</h2>
                        <p id="weatherDate">Loading...</p>
                    </div>
                    
                    <div class="weather-main">
                        <div class="temp-section">
                            <span class="material-symbols-outlined weather-icon">sunny</span>
                            <h1 id="temperature">72</h1>
                            <span class="unit">°F</span>
                        </div>
                        
                        <div class="weather-details">
                            <div class="detail-item">
                                <span class="material-symbols-outlined">cloud</span>
                                <div>
                                    <p>Condition</p>
                                    <h4 id="weatherCondition">Sunny</h4>
                                </div>
                            </div>
                            
                            <div class="detail-item">
                                <span class="material-symbols-outlined">opacity</span>
                                <div>
                                    <p>Humidity</p>
                                    <h4 id="humidity">65%</h4>
                                </div>
                            </div>
                            
                            <div class="detail-item">
                                <span class="material-symbols-outlined">air</span>
                                <div>
                                    <p>Wind Speed</p>
                                    <h4 id="windSpeed">12 km/h</h4>
                                </div>
                            </div>
                            
                            <div class="detail-item">
                                <span class="material-symbols-outlined">gauge</span>
                                <div>
                                    <p>Pressure</p>
                                    <h4 id="pressure">1013 mb</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="row mb-5">
            <!-- Temperature Chart -->
            <div class="col-md-6 mb-4">
                <div class="chart-card">
                    <h3>7-Day Temperature Trend</h3>
                    <canvas id="temperatureChart"></canvas>
                </div>
            </div>

            <!-- Humidity Chart -->
            <div class="col-md-6 mb-4">
                <div class="chart-card">
                    <h3>Humidity & Pressure</h3>
                    <canvas id="humidityChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Weekly Forecast -->
        <div class="row mb-5">
            <div class="col-md-12">
                <div class="chart-card">
                    <h3>7-Day Forecast</h3>
                    <div class="forecast-container" id="forecastContainer">
                        <!-- Forecast cards will be generated here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Wind Speed Gauge -->
        <div class="row mb-5">
            <div class="col-md-6 mb-4">
                <div class="chart-card">
                    <h3>Wind Speed Distribution</h3>
                    <canvas id="windChart"></canvas>
                </div>
            </div>

            <!-- Weather Condition Distribution -->
            <div class="col-md-6 mb-4">
                <div class="chart-card">
                    <h3>Weather Condition (This Month)</h3>
                    <canvas id="conditionChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
