<!DOCTYPE html>
<html lang="en">
<head>
    <title>Myntra Clone</title>
    <link rel="stylesheet" href="style.css">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <header>
        <div class="logo_container">
            <a href="#"><img class="myntra_home" src="images/myntra_logo.webp" alt="Myntra Home"></a>
        </div>
        <nav class="nav_bar">
            <a href="#">Men</a>
            <a href="#">Women</a>
            <a href="#">Kids</a>
            <a href="#">Home & Living</a>
            <a href="#">Beauty</a>
            <a href="#">Studio <sup>New</sup></a>
        </nav>
        <div class="search_bar">
            <span class="material-symbols-outlined search_icon">search</span>
            <input class="search_input" placeholder="Search for products, brands and more">
        </div>
        <div class="action_bar">
            <div class="action_container">
                <span class="material-symbols-outlined action_icon">person</span>
                <span class="action_name">Profile</span>
            </div>

            <div class="action_container">
                <span class="material-symbols-outlined action_icon">favorite</span>
                <span class="action_name">Wishlist</span>
            </div>

            <div class="action_container">
                <a href="#" id="bagLink" style="text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center;">
                    <span class="material-symbols-outlined action_icon">shopping_bag</span>
                    <span class="action_name">Bag <span id="bagCount" class="badge bg-danger" style="font-size: 10px;">0</span></span>
                </a>
            </div>
        </div>
    </header>

    <main>
        <div class="banner_container">
            <img class="banner_image" src="images/banner.jpg" alt="Main Banner">
        </div>

        <!-- NEW: PRODUCT CARDS (Dynamic using JS + Bootstrap) -->
        <div class="container mt-5 mb-5">
            <h2 class="category_heading pb-3">TRENDING PRODUCTS</h2>
            <div class="row" id="productContainer"></div>
        </div>

        <div class="category_heading">SHOP BY CATEGORY</div>
        <div class="category_items">
            <a href="#"><img class="sale_item" src="images/categories/1.jpg"></a>
            <a href="#"><img class="sale_item" src="images/categories/2.jpg"></a>
            <a href="#"><img class="sale_item" src="images/categories/3.jpg"></a>
            <a href="#"><img class="sale_item" src="images/categories/4.jpg"></a>
            <a href="#"><img class="sale_item" src="images/categories/5.jpg"></a>
            <a href="#"><img class="sale_item" src="images/categories/6.jpg"></a>
            <a href="#"><img class="sale_item" src="images/categories/7.jpg"></a>
            <a href="#"><img class="sale_item" src="images/categories/8.jpg"></a>
            <a href="#"><img class="sale_item" src="images/categories/9.jpg"></a>
            <a href="#"><img class="sale_item" src="images/categories/10.jpg"></a>
        </div>
    </main>

    <footer>
        <div class="footer_container">
            <div class="footer_column">
                <h3>ONLINE SHOPPING</h3>
                <a href="#">Men</a>
                <a href="#">Women</a>
                <a href="#">Kids</a>
                <a href="#">Home & Living</a>
                <a href="#">Beauty</a>
            </div>
        </div>
        <hr>
        <div class="copyright">
            © 2023 www.myntra.com. All rights reserved.
        </div>
    </footer>

    <!-- JS for Dynamic Cards -->
    <script>
        const products = [
            {name: "Cotton T-Shirt", price: 499, img: "images/categories/1.jpg", rating: 4.5},
            {name: "Slim Fit Jeans", price: 999, img: "images/categories/2.jpg", rating: 4.7},
            {name: "Casual Jacket", price: 1999, img: "images/categories/3.jpg", rating: 4.3},
            {name: "Formal Shirt", price: 699, img: "images/categories/4.jpg", rating: 4.6},
            {name: "Summer Dress", price: 1299, img: "images/categories/5.jpg", rating: 4.4},
            {name: "Winter Coat", price: 2999, img: "images/categories/6.jpg", rating: 4.8}
        ];

        let cartItems = JSON.parse(localStorage.getItem('cart')) || [];

        const container = document.getElementById("productContainer");

        // Use DocumentFragment for better performance
        const fragment = document.createDocumentFragment();

        products.forEach((p, index) => {
            const col = document.createElement("div");
            col.className = "col-md-4 col-sm-6 col-12 mb-4";
            
            col.innerHTML = `
                <div class="card h-100">
                    <img src="${p.img}" class="card-img-top" alt="${p.name}">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">${p.name}</h5>
                        <div class="mb-2">
                            <span class="badge bg-success">★ ${p.rating}</span>
                        </div>
                        <p class="card-text mt-auto">₹${p.price}</p>
                        <button class="btn btn-primary addToBagBtn" data-index="${index}" data-name="${p.name}" data-price="${p.price}">Add to Bag</button>
                    </div>
                </div>
            `;
            
            fragment.appendChild(col);
        });

        container.appendChild(fragment);

        // Function to update bag count
        function updateBagCount() {
            const bagCount = document.getElementById('bagCount');
            const totalItems = cartItems.reduce((sum, item) => sum + item.quantity, 0);
            bagCount.textContent = totalItems;
            localStorage.setItem('cart', JSON.stringify(cartItems));
        }

        // Add to Bag functionality
        document.querySelectorAll('.addToBagBtn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                
                const productName = this.getAttribute('data-name');
                const productPrice = parseInt(this.getAttribute('data-price'));
                
                // Check if item already in cart
                const existingItem = cartItems.find(item => item.name === productName);
                
                if (existingItem) {
                    existingItem.quantity += 1;
                } else {
                    cartItems.push({
                        name: productName,
                        price: productPrice,
                        quantity: 1
                    });
                }
                
                updateBagCount();
                
                // Show feedback
                this.textContent = 'Added ✓';
                this.style.backgroundColor = '#28a745';
                setTimeout(() => {
                    this.textContent = 'Add to Bag';
                    this.style.backgroundColor = '';
                }, 1500);
            });
        });

        // Bag link functionality
        document.getElementById('bagLink').addEventListener('click', function(e) {
            e.preventDefault();
            showCartModal();
        });

        // Show Cart Modal
        function showCartModal() {
            let cartHTML = '<h3>Shopping Bag</h3>';
            
            if (cartItems.length === 0) {
                cartHTML += '<p>Your bag is empty</p>';
            } else {
                cartHTML += '<table class="table"><thead><tr><th>Product</th><th>Price</th><th>Qty</th><th>Total</th><th>Action</th></tr></thead><tbody>';
                
                let total = 0;
                cartItems.forEach((item, index) => {
                    const itemTotal = item.price * item.quantity;
                    total += itemTotal;
                    cartHTML += `
                        <tr>
                            <td>${item.name}</td>
                            <td>₹${item.price}</td>
                            <td><input type="number" value="${item.quantity}" min="1" class="form-control" style="width: 60px;" onchange="updateQuantity(${index}, this.value)"></td>
                            <td>₹${itemTotal}</td>
                            <td><button class="btn btn-sm btn-danger" onclick="removeFromCart(${index})">Remove</button></td>
                        </tr>
                    `;
                });
                
                cartHTML += `</tbody></table><h4>Total: ₹${total}</h4>`;
            }
            
            // Create and show modal
            const modal = document.createElement('div');
            modal.className = 'modal fade show';
            modal.id = 'cartModal';
            modal.style.display = 'block';
            modal.innerHTML = `
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Your Shopping Bag</h5>
                            <button type="button" class="btn-close" onclick="closeCartModal()"></button>
                        </div>
                        <div class="modal-body">
                            ${cartHTML}
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" onclick="closeCartModal()">Continue Shopping</button>
                            <button type="button" class="btn btn-primary" ${cartItems.length === 0 ? 'disabled' : ''}>Checkout</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            modal.classList.add('show');
        }

        function closeCartModal() {
            const modal = document.getElementById('cartModal');
            if (modal) {
                modal.remove();
            }
        }

        function updateQuantity(index, newQty) {
            cartItems[index].quantity = parseInt(newQty);
            if (cartItems[index].quantity <= 0) {
                cartItems.splice(index, 1);
            }
            updateBagCount();
            showCartModal();
        }

        function removeFromCart(index) {
            cartItems.splice(index, 1);
            updateBagCount();
            showCartModal();
        }

        // Initialize bag count on page load
        updateBagCount();
    </script>

</body>
</html>
